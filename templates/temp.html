<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DataTables Interactive Checkboxes</title>
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/select/1.3.4/css/select.dataTables.min.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .dt-checkboxes-cell { text-align: center !important; }
        .dataTables_wrapper .dataTables_filter {
            float: right;
            text-align: right;
        }
        .column-filter {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <table id="exampleTable" class="display" style="width:100%">
        <thead>
            <tr>
                <th>Select</th>
                <th>Name</th>
                <th>Department</th>
                <th>Active <div class="column-filter">
                    <input type="checkbox" class="column-filter" data-column="3" data-state="yes"> Yes
                    <input type="checkbox" class="column-filter" data-column="3" data-state="no"> No
                    <input type="checkbox" class="column-filter" data-column="3" data-state="all" checked> All
                </div></th>
                <th>Verified <div class="column-filter">
                    <input type="checkbox" class="column-filter" data-column="4" data-state="yes"> Yes
                    <input type="checkbox" class="column-filter" data-column="4" data-state="no"> No
                    <input type="checkbox" class="column-filter" data-column="4" data-state="all" checked> All
                </div></th>
                <th>Premium <div class="column-filter">
                    <input type="checkbox" class="column-filter" data-column="5" data-state="yes"> Yes
                    <input type="checkbox" class="column-filter" data-column="5" data-state="no"> No
                    <input type="checkbox" class="column-filter" data-column="5" data-state="all" checked> All
                </div></th>
            </tr>
        </thead>
    </table>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    <!-- DataTables JS -->
    <script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
    
    <!-- DataTables Select Extension -->
    <script src="https://cdn.datatables.net/select/1.3.4/js/dataTables.select.min.js"></script>

    <script>
    $(document).ready(function() {
        // Sample data with more diverse entries
        const data = [
            [true, 'John Doe', 'Sales', true, false, true],
            [false, 'Jane Smith', 'Marketing', false, true, false],
            [true, 'Bob Johnson', 'IT', true, true, true],
            [false, 'Alice Williams', 'HR', false, false, false],
            [true, 'Charlie Brown', 'Finance', true, true, false],
            [false, 'Eva Green', 'Operations', false, true, true],
            [true, 'David Lee', 'Sales', true, false, false],
            [true, 'Sarah Kim', 'Marketing', true, true, true]
        ];

        // Initialize DataTable
        const table = $('#exampleTable').DataTable({
            data: data,
            columns: [
                { 
                    title: 'Select',
                    orderable: false,
                    className: 'dt-checkboxes-cell',
                    render: function (data, type, row, meta) {
                        return `<input type="checkbox" class="dt-checkboxes" ${data ? 'checked' : ''}>`;
                    },
                    width: '1%'
                },
                { title: 'Name' },
                { title: 'Department' },
                { 
                    title: 'Active', 
                    render: function(data) {
                        return data ? 'Yes' : 'No';
                    },
                    className: 'dt-body-center'
                },
                { 
                    title: 'Verified',
                    render: function(data) {
                        return data ? 'Yes' : 'No';
                    },
                    className: 'dt-body-center'
                },
                { 
                    title: 'Premium',
                    render: function(data) {
                        return data ? 'Yes' : 'No';
                    },
                    className: 'dt-body-center'
                }
            ],
            columnDefs: [
                {
                    targets: [0, 3, 4, 5],
                    createdCell: function (td, cellData, rowData, rowIndex, colIndex) {
                        $(td).attr('data-value', cellData);
                    }
                }
            ],
            select: {
                style: 'multi',
                selector: 'td:first-child'
            }
        });

        // Column filter logic
        $('.column-filter').on('change', function() {
            const column = $(this).data('column');
            const filterGroups = {};

            // Collect current filter states
            $(`input.column-filter[data-column="${column}"]`).each(function() {
                const state = $(this).data('state');
                filterGroups[state] = $(this).prop('checked');
            });

            // Custom filtering
            $.fn.dataTable.ext.search.push(function(settings, data, dataIndex) {
                for (let col in filterGroups) {
                    const cellValue = data[column] === 'true';
                    if (col === 'all') continue;
                    if (filterGroups[col] && ((col === 'yes') ? !cellValue : cellValue)) return false;
                }
                return true;
            });

            // Redraw table
            table.draw();
        });
    });
    </script>
</body>
</html>
